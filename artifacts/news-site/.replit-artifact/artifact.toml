kind = "web"
previewPath = "/"
title = "新闻网站"
version = "1.0.0"
id = "artifacts/news-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24124

[services.development]
run = "pnpm --filter @workspace/news-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/news-site", "run", "build" ]
publicDir = "artifacts/news-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24124"
BASE_PATH = "/"
